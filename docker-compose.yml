version: "3.8"

services:
  app:
    image: c2j-pilot-app:latest
    build: .
    container_name: c2j-app
    depends_on:
      - neo4j
      - langfuse
    env_file:
      - .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - LANGFUSE_HOST=http://langfuse:3000
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
    ports:
      - "8123:8123"
    stdin_open: true
    tty: true

  loader:
    image: c2j-loader:latest
    build:
      context: .
      dockerfile: Dockerfile.loader
    container_name: c2j-loader
    depends_on:
      - neo4j
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=c2j-pilot-2024
    volumes:
      - ./참고자료:/app/참고자료:ro
      - ./data:/app/data:ro
      - ./knowledge:/app/knowledge
    profiles:
      - loader

  neo4j:
    image: neo4j:5-community
    container_name: c2j-neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/c2j-pilot-2024
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_max__size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  langfuse-db:
    image: postgres:17-alpine
    container_name: c2j-langfuse-db
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse-pass
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 5s
      retries: 5

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: c2j-langfuse-clickhouse
    environment:
      CLICKHOUSE_DB: langfuse
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: langfuse-click
    volumes:
      - langfuse_ch_data:/var/lib/clickhouse
      - langfuse_ch_logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD", "clickhouse-client", "--user", "langfuse", "--password", "langfuse-click", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  langfuse-redis:
    image: redis:7-alpine
    container_name: c2j-langfuse-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  langfuse-minio:
    image: minio/minio:latest
    container_name: c2j-langfuse-minio
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server /data --console-address ":9001"'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - langfuse_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  langfuse:
    image: langfuse/langfuse:3
    container_name: c2j-langfuse
    depends_on:
      langfuse-db:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse-pass@langfuse-db:5432/langfuse
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse:langfuse-click@langfuse-clickhouse:9000/langfuse
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: langfuse-click
      REDIS_HOST: langfuse-redis
      REDIS_PORT: "6379"
      LANGFUSE_S3_EVENT_UPLOAD_ENABLED: "true"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minioadmin
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: minioadmin
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: c2j-langfuse-secret-key-change-me
      SALT: c2j-langfuse-salt-change-me
      ENCRYPTION_KEY: e241b286104efaea6c938d7320d3be42977048c6068aceaaff517c437ec04b4c
      TELEMETRY_ENABLED: "true"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    container_name: c2j-langfuse-worker
    depends_on:
      langfuse-db:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse-pass@langfuse-db:5432/langfuse
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse:langfuse-click@langfuse-clickhouse:9000/langfuse
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: langfuse-click
      REDIS_HOST: langfuse-redis
      REDIS_PORT: "6379"
      LANGFUSE_S3_EVENT_UPLOAD_ENABLED: "true"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minioadmin
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: minioadmin
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      SALT: c2j-langfuse-salt-change-me
      ENCRYPTION_KEY: e241b286104efaea6c938d7320d3be42977048c6068aceaaff517c437ec04b4c

volumes:
  neo4j_data:
  neo4j_logs:
  langfuse_pg_data:
  langfuse_ch_data:
  langfuse_ch_logs:
  langfuse_minio_data:
